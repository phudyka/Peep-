services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: peep
      POSTGRES_PASSWORD: peep_password
      POSTGRES_DB: peep_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - peep_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peep"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://peep:peep_password@postgres:5432/peep_db
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./maria-logo.png:/logos/maria-logo.png:ro
      - ./peep-logo.png:/logos/peep-logo.png:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - peep_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - peep_network

volumes:
  pgdata:

networks:
  peep_network:
    driver: bridge
